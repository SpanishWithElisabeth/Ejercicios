<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Casa de Papel – Personajes – Spanish with Elisabeth</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 28px 16px 60px;
    }

    header {
      max-width: 960px;
      margin: 0 auto 28px;
    }

    header a {
      font-size: 0.82rem;
      color: #888;
      text-decoration: none;
    }

    header a:hover { color: #e63946; }

    header h1 {
      font-size: 1.7rem;
      font-weight: 800;
      color: #e63946;
      margin: 8px 0 2px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    header .subtitle {
      font-size: 0.88rem;
      color: #666;
      letter-spacing: 0.5px;
    }

    .badge-b2 {
      display: inline-block;
      background: #e63946;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 3px 10px;
      border-radius: 20px;
      margin-left: 10px;
      vertical-align: middle;
    }

    /* ── SCORE BAR ── */
    #score-bar {
      max-width: 680px;
      margin: 0 auto 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.88rem;
      color: #666;
    }

    #score-bar strong { color: #e63946; }

    #progress-dots {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      background: #333;
      transition: background 0.3s;
    }

    .dot.correct { background: #43a047; }
    .dot.wrong   { background: #e53935; }
    .dot.active  { outline: 2px solid #e63946; outline-offset: 2px; }
    .dot { cursor: pointer; }

    /* ── NAV ROW ── */
    .nav-row {
      max-width: 680px;
      margin: 0 auto 16px;
      display: flex;
      justify-content: space-between;
    }

    .nav-btn {
      background: none;
      border: 1px solid #444;
      border-radius: 50px;
      padding: 7px 20px;
      font-size: 0.88rem;
      color: #777;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }

    .nav-btn:hover:not(:disabled) { border-color: #e63946; color: #e63946; }
    .nav-btn:disabled { opacity: 0.25; cursor: default; }

    /* ── RIDDLE CARD ── */
    #riddle-section {
      max-width: 680px;
      margin: 0 auto 20px;
      background: #242424;
      border-radius: 16px;
      border: 1px solid #333;
      padding: 26px 30px;
      text-align: center;
    }

    #riddle-number {
      font-size: 0.72rem;
      color: #555;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #riddle-text {
      font-size: 1.1rem;
      color: #ddd;
      line-height: 1.75;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #riddle-tag {
      margin-top: 12px;
      font-size: 0.82rem;
      color: #888;
      font-style: italic;
    }

    #feedback {
      margin-top: 14px;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 0.97rem;
      font-weight: 600;
      display: none;
    }

    #feedback.correct { background: #1e3a21; color: #66bb6a; display: block; }
    #feedback.wrong   { background: #3a1e1e; color: #ef5350; display: block; }

    #next-btn {
      margin-top: 14px;
      display: none;
      background: #e63946;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 10px 34px;
      font-size: 0.93rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    #next-btn:hover { background: #c1121f; }

    /* ── INSTRUCTION ── */
    #instruction {
      text-align: center;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 16px;
      font-style: italic;
    }

    /* ── CHARACTER GRID ── */
    #character-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
      max-width: 960px;
      margin: 0 auto 48px;
    }

    .char-card {
      background: #242424;
      border: 2px solid #333;
      border-radius: 14px;
      cursor: pointer;
      text-align: center;
      overflow: hidden;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      user-select: none;
    }

    .char-card:hover:not(.disabled) {
      border-color: #e63946;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(230,57,70,0.2);
    }

    .char-photo {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    .char-name {
      font-size: 0.8rem;
      font-weight: 700;
      color: #bbb;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 10px 6px;
    }

    /* answer states */
    .char-card.correct-answer { border-color: #43a047; }
    .char-card.correct-answer .char-name { color: #66bb6a; }
    .char-card.wrong-answer   { border-color: #e53935; }
    .char-card.wrong-answer   .char-name { color: #ef5350; }
    .char-card.reveal-correct { border-color: #43a047; }
    .char-card.reveal-correct .char-name { color: #66bb6a; }
    .char-card.disabled       { cursor: default; }

    /* ── RESULTS ── */
    #results-screen {
      display: none;
      max-width: 460px;
      margin: 40px auto;
      background: #242424;
      border-radius: 20px;
      border: 1px solid #333;
      padding: 40px 32px;
      text-align: center;
    }

    #results-screen h2 {
      font-size: 1.5rem;
      color: #e63946;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #results-screen .score-big {
      font-size: 3rem;
      font-weight: 800;
      color: #e63946;
      margin: 14px 0;
    }

    #results-screen p { color: #777; font-size: 1rem; line-height: 1.5; }

    #restart-btn {
      margin-top: 22px;
      background: #e63946;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 12px 42px;
      font-size: 0.97rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    #restart-btn:hover { background: #c1121f; }

    @media (max-width: 520px) {
      #character-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
      #riddle-text { font-size: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html">← Volver a ejercicios</a>
  <h1>La Casa de Papel <span class="badge-b2">B2</span></h1>
  <p class="subtitle">Personajes — Temporada 1, Episodios 1 y 2</p>
</header>

<div id="score-bar">
  <div>Correctas: <strong id="correct-count">0</strong></div>
  <div id="progress-dots"></div>
  <div>Pregunta <strong id="q-current">1</strong> / <strong id="q-total">10</strong></div>
</div>

<div id="riddle-section">
  <div id="riddle-number"></div>
  <div id="riddle-text"></div>
  <div id="riddle-tag"></div>
  <div id="feedback"></div>
  <button id="next-btn" onclick="nextRiddle()">Siguiente &rarr;</button>
</div>

<div class="nav-row">
  <button class="nav-btn" id="prev-btn" onclick="go(-1)" disabled>&#8592; Anterior</button>
  <button class="nav-btn" id="next-btn-nav" onclick="go(1)" disabled>Siguiente &#8594;</button>
</div>

<p id="instruction">Haz clic en el personaje que corresponde a la descripcion</p>

<div id="character-grid"></div>

<div id="results-screen">
  <h2>Fin del ejercicio</h2>
  <div class="score-big" id="final-score"></div>
  <p id="result-msg"></p>
  <button id="restart-btn" onclick="restartGame()">Jugar otra vez</button>
</div>

<script>
  const characters = [
    { id: "profesor", label: "El Profesor",    photo: "profesor.jpeg" },
    { id: "tokio",    label: "Tokio",          photo: "tokio.jpeg"    },
    { id: "berlin",   label: "Berlin",         photo: "berlin.jpeg"   },
    { id: "nairobi",  label: "Nairobi",        photo: "nairobi.jpeg"  },
    { id: "moscu",    label: "Moscu",          photo: "moscu.jpeg"    },
    { id: "denver",   label: "Denver",         photo: "denver.jpeg"   },
    { id: "rio",      label: "Rio",            photo: "rio.jpeg"      },
    { id: "helsinki", label: "Helsinki",       photo: "helsinki.jpeg" },
    { id: "oslo",     label: "Oslo",           photo: "oslo.jpeg"     },
    { id: "raquel",   label: "Raquel Murillo", photo: "raquel.jpeg"   },
  ];

  const riddles = [
    { answer: "profesor", text: "Recluta a los miembros del atraco y dirige toda la operacion desde el exterior. Es meticuloso, organizado y explica el plan general del robo.", tag: "Es hombre. No es joven." },
    { answer: "tokio",    text: "Narradora de la historia. Era fugitiva con antecedentes delictivos antes del atraco. Tiene un caracter impulsivo y es reclutada por el Profesor.", tag: "Es mujer. Es joven." },
    { answer: "berlin",   text: "El miembro con mayor autoridad dentro de la fabrica. Actua como lider, tiene una personalidad dominante y toma decisiones firmes frente a los rehenes.", tag: "Es hombre. No es joven." },
    { answer: "nairobi",  text: "Forma parte del equipo encargado del dinero dentro de la fabrica. Es participativa, comprometida con el plan y tiene una actitud muy energica.", tag: "Es mujer. Es joven." },
    { answer: "moscu",    text: "Atracador con experiencia en trabajos manuales. Colabora en las tareas fisicas necesarias para el plan. Mantiene una actitud tranquila y colaborativa.", tag: "Es hombre. No es joven." },
    { answer: "denver",   text: "Participa en el control de los rehenes. Se muestra nervioso en varios momentos y tiene una actitud impulsiva dentro del grupo.", tag: "Es hombre. Es joven." },
    { answer: "rio",      text: "El miembro mas joven del equipo. Se encarga de las tareas tecnicas del plan. Le falta la experiencia del resto del grupo.", tag: "Es hombre. Es muy joven." },
    { answer: "helsinki", text: "Uno de los encargados de vigilar a los rehenes. Se muestra firme y obediente. Siempre actua en coordinacion con su companero.", tag: "Es hombre. No es joven." },
    { answer: "oslo",     text: "Acompana a Helsinki en el control de los rehenes. Tiene una presencia silenciosa e imponente. Cumple ordenes sin cuestionarlas.", tag: "Es hombre. No es joven." },
    { answer: "raquel",   text: "Inspectora encargada de liderar la respuesta policial al atraco. Coordina el operativo desde el exterior. Es profesional y centrada.", tag: "Es mujer. No es joven." },
  ];

  // ── STATE ──────────────────────────────────────────────────────────────────
  let shuffledRiddles = [];
  let currentIndex    = 0;
  let correctCount    = 0;
  let dotEls          = [];
  // results[i] = { correct, selectedId } once answered, else null
  let results         = [];

  // ── INIT ───────────────────────────────────────────────────────────────────
  function startGame() {
    shuffledRiddles = shuffle(riddles);
    currentIndex    = 0;
    correctCount    = 0;
    results         = shuffledRiddles.map(() => null);

    document.getElementById("correct-count").textContent    = 0;
    document.getElementById("q-total").textContent          = shuffledRiddles.length;
    document.getElementById("results-screen").style.display = "none";
    document.getElementById("riddle-section").style.display = "";
    document.getElementById("character-grid").style.display = "";
    document.getElementById("instruction").style.display    = "";
    document.getElementById("score-bar").style.display      = "";
    document.querySelector(".nav-row").style.display        = "";

    buildGrid();
    buildDots(shuffledRiddles.length);
    showRiddle();
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ── GRID ───────────────────────────────────────────────────────────────────
  function buildGrid() {
    const grid = document.getElementById("character-grid");
    grid.innerHTML = "";
    characters.forEach(c => {
      const card = document.createElement("div");
      card.className = "char-card";
      card.id = "card-" + c.id;
      card.innerHTML = `
        <img class="char-photo" src="${c.photo}" alt="${c.label}" onerror="this.style.height='140px';this.style.background='#333'">
        <div class="char-name">${c.label}</div>`;
      card.addEventListener("click", () => handleAnswer(c.id));
      grid.appendChild(card);
    });
  }

  // ── DOTS ───────────────────────────────────────────────────────────────────
  function buildDots(total) {
    const container = document.getElementById("progress-dots");
    container.innerHTML = "";
    dotEls = [];
    for (let i = 0; i < total; i++) {
      const d = document.createElement("div");
      d.className = "dot";
      d.title = "Personaje " + (i + 1);
      d.onclick = () => { currentIndex = i; showRiddle(); };
      container.appendChild(d);
      dotEls.push(d);
    }
  }

  function refreshDots() {
    dotEls.forEach((d, i) => {
      d.className = "dot";
      if (results[i] !== null) d.classList.add(results[i].correct ? "correct" : "wrong");
      if (i === currentIndex)  d.classList.add("active");
    });
  }

  // ── NAV ────────────────────────────────────────────────────────────────────
  function go(dir) {
    const next = currentIndex + dir;
    if (next < 0 || next >= shuffledRiddles.length) return;
    currentIndex = next;
    showRiddle();
  }

  function updateNavButtons() {
    document.getElementById("prev-btn").disabled     = currentIndex === 0;
    document.getElementById("next-btn-nav").disabled = currentIndex >= shuffledRiddles.length - 1;
    document.getElementById("q-current").textContent = currentIndex + 1;
  }

  // ── SHOW ───────────────────────────────────────────────────────────────────
  function showRiddle() {
    refreshDots();
    updateNavButtons();

    const r    = shuffledRiddles[currentIndex];
    const done = results[currentIndex] !== null;

    document.getElementById("riddle-number").textContent = "Personaje " + (currentIndex + 1) + " de " + shuffledRiddles.length;
    document.getElementById("riddle-text").textContent   = r.text;
    document.getElementById("riddle-tag").textContent    = r.tag;

    // reset cards
    document.querySelectorAll(".char-card").forEach(c => { c.className = "char-card"; });

    const fb = document.getElementById("feedback");

    if (done) {
      const res         = results[currentIndex];
      const correctChar = characters.find(c => c.id === r.answer);

      document.querySelectorAll(".char-card").forEach(c => c.classList.add("disabled"));
      document.getElementById("card-" + res.selectedId).classList.add(res.correct ? "correct-answer" : "wrong-answer");
      if (!res.correct) document.getElementById("card-" + r.answer).classList.add("reveal-correct");

      fb.className   = res.correct ? "correct" : "wrong";
      fb.textContent = res.correct
        ? "Correcto. Es " + correctChar.label
        : "Incorrecto. La respuesta correcta es " + correctChar.label;
      fb.style.display = "block";

      const nextBtn = document.getElementById("next-btn");
      const allDone = results.every(r => r !== null);
      if (currentIndex === shuffledRiddles.length - 1 && allDone) {
        nextBtn.textContent   = "Ver resultado";
        nextBtn.style.display = "inline-block";
      } else if (currentIndex < shuffledRiddles.length - 1) {
        nextBtn.textContent   = "Siguiente \u2192";
        nextBtn.style.display = "inline-block";
      } else {
        nextBtn.style.display = "none";
      }
    } else {
      fb.style.display = "none";
      fb.className     = "";
      document.getElementById("next-btn").style.display = "none";
    }
  }

  // ── ANSWER ─────────────────────────────────────────────────────────────────
  function handleAnswer(selectedId) {
    if (results[currentIndex] !== null) return;

    const r           = shuffledRiddles[currentIndex];
    const correct     = r.answer === selectedId;
    const correctChar = characters.find(c => c.id === r.answer);

    results[currentIndex] = { correct, selectedId };
    if (correct) {
      correctCount++;
      document.getElementById("correct-count").textContent = correctCount;
    }

    refreshDots();
    document.querySelectorAll(".char-card").forEach(c => c.classList.add("disabled"));
    document.getElementById("card-" + selectedId).classList.add(correct ? "correct-answer" : "wrong-answer");
    if (!correct) document.getElementById("card-" + r.answer).classList.add("reveal-correct");

    const fb = document.getElementById("feedback");
    fb.className   = correct ? "correct" : "wrong";
    fb.textContent = correct
      ? "Correcto. Es " + correctChar.label
      : "Incorrecto. La respuesta correcta es " + correctChar.label;
    fb.style.display = "block";

    const nextBtn   = document.getElementById("next-btn");
    const allDone   = results.every(r => r !== null);
    nextBtn.textContent   = (currentIndex === shuffledRiddles.length - 1 && allDone) ? "Ver resultado" : "Siguiente \u2192";
    nextBtn.style.display = "inline-block";
  }

  function nextRiddle() {
    const allDone = results.every(r => r !== null);
    if (currentIndex === shuffledRiddles.length - 1 && allDone) {
      showResults();
    } else {
      go(1);
    }
  }

  // ── RESULTS ────────────────────────────────────────────────────────────────
  function showResults() {
    document.getElementById("riddle-section").style.display = "none";
    document.getElementById("character-grid").style.display = "none";
    document.getElementById("instruction").style.display    = "none";
    document.querySelector(".nav-row").style.display        = "none";

    const total = shuffledRiddles.length;
    const pct   = correctCount / total;
    let msg = "";
    if (pct === 1)      msg = "Perfecto. Conoces muy bien a los personajes.";
    else if (pct >= .8) msg = "Muy bien. Casi perfecto.";
    else if (pct >= .6) msg = "Bien. Sigue practicando.";
    else if (pct >= .4) msg = "Buen intento. Vuelve a ver los episodios.";
    else                msg = "Sigue estudiando. Tu puedes.";

    document.getElementById("final-score").textContent      = correctCount + " / " + total;
    document.getElementById("result-msg").textContent       = msg;
    document.getElementById("results-screen").style.display = "block";
  }

  function restartGame() { startGame(); }

  startGame();
</script>
</body>
</html>
