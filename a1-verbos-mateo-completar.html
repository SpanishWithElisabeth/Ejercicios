<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A1 — El día de Mateo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f8fd;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 0 0 48px;
    }

    header {
      background: #5e9ed7;
      color: #fff;
      padding: 20px 24px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; }
    header p { font-size: 0.85rem; opacity: 0.88; margin-top: 2px; }
    .cefr-badge {
      background: #f5ca64;
      color: #1a1a1a;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 3px 10px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .container {
      max-width: 720px;
      margin: 28px auto 0;
      padding: 0 20px;
    }

    .instructions {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    #chip-bank {
      background: #fff;
      border: 1px solid #d0e4f5;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 28px;
      min-height: 70px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-content: flex-start;
    }

    .chip {
      background: #e8f3fd;
      border: 2px solid #b8d8f5;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.9rem;
      color: #1a4a6e;
      cursor: grab;
      user-select: none;
      transition: background 0.12s, border-color 0.12s, transform 0.1s, opacity 0.1s;
      touch-action: none;
    }
    .chip:hover { background: #d4eaf9; border-color: #89c2f1; }
    .chip.dragging { opacity: 0.45; transform: scale(0.97); cursor: grabbing; }
    .chip.selected {
      background: #c8e0f5;
      border-color: #5e9ed7;
      box-shadow: 0 0 0 2px #5e9ed7;
    }
    .chip.placed-correct {
      background: #e8f3fd;
      border-color: #5e9ed7;
      color: #1a4a6e;
      cursor: default;
    }

    .story {
      background: #fff;
      border: 1px solid #d0e4f5;
      border-radius: 12px;
      padding: 20px 22px;
      margin-bottom: 20px;
      font-size: 1rem;
      line-height: 2;
      color: #1a1a1a;
    }

    .blank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      min-height: 32px;
      border: 2px dashed #b8d8f5;
      border-radius: 8px;
      padding: 2px 8px;
      background: #f8fbfe;
      cursor: pointer;
      vertical-align: middle;
      transition: border-color 0.15s, background 0.15s;
    }
    .blank:hover { border-color: #89c2f1; background: #eef6fd; }
    .blank.drag-over { border-color: #5e9ed7; background: #e8f3fd; }
    .blank.filled {
      border-style: solid;
      background: #e8f3fd;
      border-color: #5e9ed7;
      color: #1a4a6e;
      font-weight: 600;
      padding: 4px 10px;
    }
    .blank.checked-correct {
      border-style: solid;
      background: #e8f3fd;
      border-color: #5e9ed7;
      color: #1a4a6e;
      font-weight: 600;
    }
    .blank.checked-wrong {
      border-style: solid;
      background: #fdf0eb;
      border-color: #d77a5e;
      color: #7a2e10;
      font-weight: 600;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    button.main-btn {
      background: #5e9ed7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
    }
    button.main-btn:hover { background: #89c2f1; }
    button.main-btn:disabled { background: #c5dff0; cursor: default; }
    button.secondary {
      background: #fff;
      color: #5e9ed7;
      border: 2px solid #5e9ed7;
    }
    button.secondary:hover { background: #eef6fd; }

    #feedback-bar {
      display: none;
      background: #fff;
      border: 1px solid #d0e4f5;
      border-radius: 12px;
      padding: 18px 22px;
      margin-bottom: 16px;
      text-align: center;
    }
    #feedback-bar.show { display: block; }
    #feedback-bar .score {
      font-size: 1.8rem;
      font-weight: 700;
      color: #5e9ed7;
      margin-bottom: 6px;
    }
    #feedback-bar .msg { color: #444; font-size: 0.92rem; }

    footer {
      max-width: 720px;
      margin: 32px auto 0;
      padding: 0 20px;
      font-size: 0.8rem;
      color: #bbb;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>El día de Mateo</h1>
    <p>Arrastra cada verbo al espacio correcto</p>
  </div>
  <span class="cefr-badge">A1</span>
</header>

<div class="container">

  <p class="instructions">
    Drag each verb into the correct space in the story. On mobile, tap a chip and then tap a space. When you finish, click <strong>Verificar</strong>.
  </p>

  <div id="chip-bank"
       ondragover="bankDragOver(event)"
       ondrop="bankDrop(event)">
  </div>

  <div class="story" id="story"></div>

  <div class="btn-row">
    <button class="main-btn" id="btn-check" onclick="checkAnswers()">Verificar</button>
    <button class="main-btn secondary" id="btn-retry" onclick="resetAll()" style="display:none">Jugar otra vez</button>
  </div>

  <div id="feedback-bar">
    <div class="score" id="score-text"></div>
    <div class="msg" id="msg-text"></div>
  </div>

</div>

<footer>Spanish with Elisabeth &mdash; spanishwithelisabeth.com</footer>

<script>
  // Six blanks embedded in the story, each with its correct verb.
  // The surrounding prose is rendered exactly as written.
  const STORY_PARTS = [
    { text: 'Todos los días Mateo ' },
    { blank: true, answer: 'sale de' },
    { text: ' casa a las seis de la tarde y pasea a su perro. Sale a caminar porque quiere ' },
    { blank: true, answer: 'hacer' },
    { text: ' ejercicio. Pero hoy sale más temprano, sale a las cinco. Cuando llega al parque ' },
    { blank: true, answer: 've' },
    { text: ' a Lucía, su nueva compañera de clase. Mateo ' },
    { blank: true, answer: 'se pone' },
    { text: ' muy nervioso porque le gusta Lucía. La saluda y conversa un poco con ella. ' },
    { blank: true, answer: 'Le pide' },
    { text: ' su correo electrónico, pero ella no le da su correo. Mateo se pone triste, ya no tiene ganas de caminar y ' },
    { blank: true, answer: 'va a' },
    { text: ' su casa.' }
  ];

  // Build the ordered list of answers and the chip bank.
  const ANSWERS = STORY_PARTS.filter(p => p.blank).map(p => p.answer);
  const CHIPS = ANSWERS.map((verb, i) => ({ id: 'c-' + i, verb }));

  let draggedId = null;
  let selectedId = null;
  let checked = false;

  const placements = new Array(ANSWERS.length).fill(null);

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function buildChipEl(chip) {
    const el = document.createElement('div');
    el.className = 'chip';
    el.id = chip.id;
    el.dataset.verb = chip.verb;
    el.textContent = chip.verb;
    el.draggable = true;

    el.addEventListener('dragstart', (e) => {
      if (checked) return;
      draggedId = chip.id;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', chip.id);
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      draggedId = null;
    });

    el.addEventListener('click', () => {
      if (checked) return;
      if (selectedId === chip.id) {
        el.classList.remove('selected');
        selectedId = null;
      } else {
        if (selectedId) {
          const old = document.getElementById(selectedId);
          if (old) old.classList.remove('selected');
        }
        selectedId = chip.id;
        el.classList.add('selected');
      }
    });

    return el;
  }

  let chipOrder = shuffle(CHIPS.slice());

  function renderBank() {
    const bank = document.getElementById('chip-bank');
    bank.innerHTML = '';
    const used = new Set(placements.filter(Boolean));
    chipOrder.filter(c => !used.has(c.id)).forEach(chip => bank.appendChild(buildChipEl(chip)));
  }

  function renderStory() {
    const wrap = document.getElementById('story');
    wrap.innerHTML = '';
    let blankIdx = 0;
    STORY_PARTS.forEach(part => {
      if (part.blank) {
        const i = blankIdx++;
        const span = document.createElement('span');
        span.className = 'blank';
        span.id = 'blank-' + i;
        span.setAttribute('ondragover', `blankDragOver(event, ${i})`);
        span.setAttribute('ondragleave', `blankDragLeave(event, ${i})`);
        span.setAttribute('ondrop', `blankDrop(event, ${i})`);
        span.setAttribute('onclick', `blankClick(${i})`);
        wrap.appendChild(span);
      } else {
        wrap.appendChild(document.createTextNode(part.text));
      }
    });
    refreshBlanks();
  }

  function refreshBlanks() {
    ANSWERS.forEach((_, i) => {
      const blank = document.getElementById('blank-' + i);
      const chipId = placements[i];
      blank.classList.remove('filled', 'drag-over', 'checked-correct', 'checked-wrong');
      if (chipId) {
        const chip = CHIPS.find(c => c.id === chipId);
        blank.textContent = chip ? chip.verb : '';
        blank.classList.add('filled');
      } else {
        blank.textContent = '';
      }
    });
  }

  window.bankDragOver = function(e) {
    if (checked) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
  };
  window.bankDrop = function(e) {
    if (checked) return;
    e.preventDefault();
    const id = draggedId || e.dataTransfer.getData('text/plain');
    if (!id) return;
    const idx = placements.indexOf(id);
    if (idx !== -1) placements[idx] = null;
    renderBank();
    refreshBlanks();
  };

  window.blankDragOver = function(e, i) {
    if (checked) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.getElementById('blank-' + i).classList.add('drag-over');
  };
  window.blankDragLeave = function(e, i) {
    document.getElementById('blank-' + i).classList.remove('drag-over');
  };
  window.blankDrop = function(e, i) {
    if (checked) return;
    e.preventDefault();
    document.getElementById('blank-' + i).classList.remove('drag-over');
    const id = draggedId || e.dataTransfer.getData('text/plain');
    if (!id) return;
    placeChip(id, i);
  };

  window.blankClick = function(i) {
    if (checked) return;
    if (selectedId) {
      placeChip(selectedId, i);
      selectedId = null;
    } else if (placements[i]) {
      placements[i] = null;
      renderBank();
      refreshBlanks();
    }
  };

  function placeChip(chipId, targetIdx) {
    const prevIdx = placements.indexOf(chipId);
    if (prevIdx !== -1) placements[prevIdx] = null;
    placements[targetIdx] = chipId;
    renderBank();
    refreshBlanks();
  }

  function checkAnswers() {
    if (placements.some(p => p === null)) {
      const bar = document.getElementById('feedback-bar');
      bar.classList.add('show');
      document.getElementById('score-text').textContent = 'Faltan respuestas';
      document.getElementById('msg-text').textContent = 'Completa todos los espacios antes de verificar.';
      return;
    }

    checked = true;
    let correct = 0;
    ANSWERS.forEach((ans, i) => {
      const blank = document.getElementById('blank-' + i);
      const chipId = placements[i];
      const chip = CHIPS.find(c => c.id === chipId);
      blank.classList.remove('filled');
      if (chip && chip.verb === ans) {
        blank.classList.add('checked-correct');
        correct++;
      } else {
        blank.classList.add('checked-wrong');
      }
    });

    document.querySelectorAll('.chip').forEach(el => {
      el.draggable = false;
      el.classList.add('placed-correct');
    });

    const bar = document.getElementById('feedback-bar');
    bar.classList.add('show');
    document.getElementById('score-text').textContent = correct + ' / ' + ANSWERS.length;
    let msg;
    if (correct === ANSWERS.length) msg = 'Excelente. Todas las respuestas son correctas.';
    else if (correct >= ANSWERS.length - 1) msg = 'Muy bien. Revisa la marcada en rojo.';
    else if (correct >= ANSWERS.length / 2) msg = 'Buen intento. Repasa los verbos e intenta de nuevo.';
    else msg = 'Practica un poco más y vuelve a intentar.';
    document.getElementById('msg-text').textContent = msg;

    document.getElementById('btn-check').style.display = 'none';
    document.getElementById('btn-retry').style.display = 'inline-block';
  }

  function resetAll() {
    checked = false;
    selectedId = null;
    draggedId = null;
    for (let i = 0; i < placements.length; i++) placements[i] = null;
    document.getElementById('feedback-bar').classList.remove('show');
    document.getElementById('btn-check').style.display = 'inline-block';
    document.getElementById('btn-retry').style.display = 'none';
    chipOrder = shuffle(CHIPS.slice());
    renderBank();
    renderStory();
  }

  renderBank();
  renderStory();
</script>

</body>
</html>
