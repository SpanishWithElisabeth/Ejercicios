<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verbos en presente – Spanish with Elisabeth</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f7f7f5;
      color: #222;
      min-height: 100vh;
      padding: 32px 16px 60px;
    }

    header {
      max-width: 680px;
      margin: 0 auto 28px;
    }

    header a {
      font-size: 0.82rem;
      color: #999;
      text-decoration: none;
    }

    header a:hover { color: #2e7d32; }

    header h1 {
      font-size: 1.55rem;
      font-weight: 700;
      color: #2e7d32;
      margin: 8px 0 4px;
    }

    header p {
      font-size: 0.92rem;
      color: #888;
    }

    /* ── PROGRESS ── */
    #progress-bar-wrap {
      max-width: 680px;
      margin: 0 auto 14px;
    }

    #progress-label {
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    #progress-track {
      height: 6px;
      background: #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      background: #2e7d32;
      border-radius: 10px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* ── SCORE DOTS ── */
    #score-bar {
      max-width: 680px;
      margin: 0 auto 14px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .score-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      background: #ddd;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .score-dot:hover { transform: scale(1.3); }
    .score-dot.active { outline: 2px solid #2e7d32; outline-offset: 2px; }
    .score-dot.c { background: #43a047; }
    .score-dot.w { background: #e53935; }

    /* ── NAV ROW ── */
    .nav-row {
      max-width: 680px;
      margin: 0 auto 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 50px;
      padding: 7px 20px;
      font-size: 0.88rem;
      color: #888;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }

    .nav-btn:hover:not(:disabled) { border-color: #81c784; color: #2e7d32; }
    .nav-btn:disabled { opacity: 0.25; cursor: default; }

    /* ── QUESTION CARD ── */
    .card {
      max-width: 680px;
      margin: 0 auto 16px;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e8e8e8;
      padding: 28px 28px 24px;
    }

    .question-meta {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 1.15rem;
      color: #333;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    /* ── MULTIPLE CHOICE ── */
    .choices {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .choice-btn {
      background: #f7f7f5;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 1rem;
      color: #333;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
      font-family: inherit;
    }

    .choice-btn:hover:not(:disabled) {
      border-color: #81c784;
      background: #f1f8f1;
    }

    .choice-btn.correct { border-color: #43a047; background: #e8f5e9; color: #1b5e20; }
    .choice-btn.wrong   { border-color: #e53935; background: #fce4ec; color: #b71c1c; }

    /* ── DRAG THE WORDS ── */
    .drag-sentence {
      font-size: 1.05rem;
      line-height: 2.4;
      color: #333;
      margin-bottom: 4px;
    }

    .drag-blank {
      display: inline-block;
      min-width: 90px;
      border-bottom: 2px solid #2e7d32;
      margin: 0 4px;
      text-align: center;
      color: #2e7d32;
      font-weight: 600;
      cursor: pointer;
      padding: 0 6px;
      vertical-align: bottom;
      transition: background 0.15s;
      border-radius: 4px 4px 0 0;
    }

    .drag-blank:hover:not(.locked) { background: #f1f8f1; }
    .drag-blank.filled  { background: #f1f8f1; }
    .drag-blank.correct-word { border-bottom-color: #43a047; color: #1b5e20; background: #e8f5e9; }
    .drag-blank.wrong-word   { border-bottom-color: #e53935; color: #b71c1c; background: #fce4ec; }
    .drag-blank.locked { cursor: default; }

    .word-bank {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
      padding: 14px;
      background: #f7f7f5;
      border-radius: 10px;
      min-height: 48px;
    }

    .word-chip {
      background: #fff;
      border: 2px solid #ddd;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }

    .word-chip:hover:not(.used) { border-color: #81c784; background: #f1f8f1; }
    .word-chip.used { opacity: 0.3; pointer-events: none; }

    /* ── FILL IN THE BLANK ── */
    .blank-sentence {
      font-size: 1.1rem;
      line-height: 2;
      color: #333;
    }

    .blank-input {
      border: none;
      border-bottom: 2px solid #2e7d32;
      background: transparent;
      font-size: 1.05rem;
      font-family: inherit;
      color: #2e7d32;
      font-weight: 600;
      width: 130px;
      text-align: center;
      outline: none;
      padding: 2px 4px;
      margin: 0 4px;
    }

    .blank-input.correct-input { border-bottom-color: #43a047; color: #1b5e20; }
    .blank-input.wrong-input   { border-bottom-color: #e53935; color: #e53935; }

    /* ── FEEDBACK ── */
    .feedback {
      margin-top: 16px;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      display: none;
    }

    .feedback.correct { background: #e8f5e9; color: #2e7d32; display: block; }
    .feedback.wrong   { background: #fce4ec; color: #c62828; display: block; }

    /* ── ACTION BUTTONS ── */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      border: none;
      border-radius: 50px;
      padding: 10px 28px;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      font-weight: 600;
    }

    .btn-primary   { background: #2e7d32; color: #fff; }
    .btn-primary:hover { background: #1b5e20; }
    .btn-secondary { background: #eee; color: #555; }
    .btn-secondary:hover { background: #ddd; }

    /* ── RESULTS ── */
    #results {
      display: none;
      max-width: 500px;
      margin: 40px auto;
      background: #fff;
      border-radius: 20px;
      border: 1px solid #e8e8e8;
      padding: 40px 32px;
      text-align: center;
    }

    #results h2 { font-size: 1.6rem; color: #2e7d32; margin-bottom: 8px; }
    #results .score-big { font-size: 3rem; font-weight: 700; color: #2e7d32; margin: 16px 0; }
    #results p { color: #666; font-size: 1rem; line-height: 1.6; margin-bottom: 6px; }

    @media (max-width: 480px) {
      .card { padding: 20px 16px; }
      .question-text { font-size: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <a href="index.html">← Volver a ejercicios</a>
  <h1>Verbos en presente</h1>
  <p>Trabajar · Hablar · Comer · Leer · Abrir · Vivir · Pintar</p>
</header>

<div id="progress-bar-wrap">
  <div id="progress-label">Pregunta <span id="q-num">1</span> de <span id="q-total">14</span></div>
  <div id="progress-track"><div id="progress-fill"></div></div>
</div>

<div id="score-bar"></div>

<div class="nav-row">
  <button class="nav-btn" id="prev-btn" onclick="go(-1)" disabled>&#8592; Anterior</button>
  <button class="nav-btn" id="next-btn" onclick="go(1)" disabled>Siguiente &#8594;</button>
</div>

<div id="question-area"></div>

<div id="results">
  <h2>Fin del ejercicio</h2>
  <div class="score-big" id="final-score"></div>
  <p id="result-msg"></p>
  <div class="btn-row" style="justify-content:center; margin-top:24px;">
    <button class="btn btn-primary" onclick="restart()">Intentar otra vez</button>
    <a href="index.html"><button class="btn btn-secondary">Volver al inicio</button></a>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const questions = [
  { type:"mc", prompt:"Elige la forma correcta.", question:"you work (trabajar)", options:["trabajaras","trabajas"], answer:"trabajas" },
  { type:"mc", prompt:"Elige la forma correcta.", question:"we speak (hablar)",   options:["hablamos","hablaramos"], answer:"hablamos" },
  { type:"mc", prompt:"Elige la forma correcta.", question:"she eats (comer)",    options:["come","coma"],           answer:"come" },
  { type:"mc", prompt:"Elige la forma correcta.", question:"they read (leer)",    options:["len","leen"],            answer:"leen" },
  { type:"mc", prompt:"Elige la forma correcta.", question:"we open (abrir)",     options:["abrimos","abremos"],    answer:"abrimos" },

  { type:"drag", prompt:"Haz clic en una palabra del banco y luego en el espacio correcto.", title:"Trabajar — completa las oraciones",
    sentences:[
      { before:"Hoy yo no",      blank:"trabajo",   after:"." },
      { before:"Ella",           blank:"trabaja",   after:"esta noche." },
      { before:"Manana tu",      blank:"trabajas",  after:"." },
      { before:"Esta noche ellos", blank:"trabajan", after:"." },
      { before:"Nosotros no",    blank:"trabajamos", after:"el lunes." }
    ]
  },
  { type:"drag", prompt:"Haz clic en una palabra del banco y luego en el espacio correcto.", title:"Comer — completa las oraciones",
    sentences:[
      { before:"Esta noche, yo", blank:"como",    after:"con mis amigos." },
      { before:"Ellas",          blank:"comen",   after:"en el restaurante." },
      { before:"¿",              blank:"Come",    after:"usted con mi amiga el lunes?" },
      { before:"Nosotros no",    blank:"comemos", after:"carne, somos vegetarianos." },
      { before:"¿",              blank:"Comes",   after:"tu con nosotros?" }
    ]
  },
  { type:"drag", prompt:"Haz clic en una palabra del banco y luego en el espacio correcto.", title:"Vivir — completa las oraciones",
    sentences:[
      { before:"Maria",         blank:"vive",    after:"con su mama." },
      { before:"Mis amigas",    blank:"viven",   after:"en Buenos Aires." },
      { before:"Jose y yo",     blank:"vivimos", after:"en España." },
      { before:"¿",             blank:"Vives",   after:"tu con tu familia?" },
      { before:"Yo",            blank:"vivo",    after:"en una casa pequeña." }
    ]
  },

  { type:"fill", prompt:"Escribe la forma correcta del verbo.", question:'¿Como se dice "I paint on Sunday"? (pintar)',          sentence:"El domingo ___.",         answer:"pinto"    },
  { type:"fill", prompt:"Escribe la forma correcta del verbo.", question:'¿Como se dice "I don\'t read in the morning"? (leer)', sentence:"Por la mañana no ___.",   answer:"leo"      },
  { type:"fill", prompt:"Escribe la forma correcta del verbo.", question:'¿Como se dice "Are you opening your store"? (abrir)',  sentence:"¿___ tu tienda?",         answer:"abres"    },
  { type:"fill", prompt:"Escribe la forma correcta del verbo.", question:'¿Como se dice "Are you working on Saturday"? (trabajar)', sentence:"¿___ el sabado?",      answer:"trabajas" },
  { type:"fill", prompt:"Escribe la forma correcta del verbo.", question:'¿Como se dice "We eat fruit every day"? (comer)',      sentence:"___ frutas todos los dias.", answer:"comemos"},
  { type:"fill", prompt:"Escribe la forma correcta del verbo.", question:'¿Como se dice "Do you speak Spanish"? (hablar)',       sentence:"¿___ español?",           answer:"hablas"   }
];

// ── STATE ─────────────────────────────────────────────────────────────────────
// results[i] = { correct: bool } once answered, else null
let results = [];
let current = 0;
let dots    = [];
// per-question drag state (keyed by question index)
let dragStates = {};
// selected chip for two-step drag
let selectedChip = null;

// ── INIT ──────────────────────────────────────────────────────────────────────
function restart() {
  results    = questions.map(() => null);
  dragStates = {};
  selectedChip = null;
  current    = 0;
  document.getElementById("results").style.display       = "none";
  document.getElementById("question-area").style.display = "";
  document.getElementById("progress-bar-wrap").style.display = "";
  document.getElementById("score-bar").style.display     = "";
  document.querySelector(".nav-row").style.display       = "";
  buildDots();
  render();
}

function buildDots() {
  const bar = document.getElementById("score-bar");
  bar.innerHTML = "";
  dots = [];
  questions.forEach((_, i) => {
    const d = document.createElement("div");
    d.className = "score-dot";
    d.title = "Pregunta " + (i + 1);
    d.onclick = () => { current = i; render(); };
    bar.appendChild(d);
    dots.push(d);
  });
}

function refreshDots() {
  dots.forEach((d, i) => {
    d.className = "score-dot";
    if (results[i] !== null) d.classList.add(results[i].correct ? "c" : "w");
    if (i === current)       d.classList.add("active");
  });
}

function updateProgress() {
  const pct = ((current + 1) / questions.length) * 100;
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("q-num").textContent   = current + 1;
  document.getElementById("q-total").textContent = questions.length;

  document.getElementById("prev-btn").disabled = (current === 0);
  // next enabled if already answered OR there are later questions
  document.getElementById("next-btn").disabled = (current >= questions.length - 1);
}

function go(dir) {
  const next = current + dir;
  if (next < 0 || next >= questions.length) return;
  current = next;
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  selectedChip = null;
  refreshDots();
  updateProgress();
  const q    = questions[current];
  const area = document.getElementById("question-area");
  const done = results[current] !== null;

  if (q.type === "mc")   area.innerHTML = renderMC(q, done);
  if (q.type === "drag") area.innerHTML = renderDrag(q, done);
  if (q.type === "fill") area.innerHTML = renderFill(q, done);

  // restore drag UI if coming back to an answered drag question
  if (q.type === "drag" && done) restoreDrag(q);
}

// ── SCORE COUNT ───────────────────────────────────────────────────────────────
function countScore() {
  return results.filter(r => r && r.correct).length;
}

// ── MULTIPLE CHOICE ───────────────────────────────────────────────────────────
function renderMC(q, done) {
  const opts = q.options.map(o => {
    let cls = "choice-btn";
    let dis = "";
    if (done) {
      dis = "disabled";
      if (o === q.answer) cls += " correct";
      else if (results[current] && !results[current].correct && o === results[current].chosen) cls += " wrong";
    }
    return `<button class="${cls}" ${dis} onclick="checkMC('${o}')">${o}</button>`;
  }).join("");

  const fb = done
    ? `<div class="feedback ${results[current].correct ? "correct" : "wrong"}">${results[current].correct ? "Correcto" : "Incorrecto. La respuesta correcta es: " + q.answer}</div>`
    : `<div class="feedback" id="fb"></div>`;

  const nav = done
    ? navButtons()
    : `<div class="btn-row" id="btn-row" style="display:none">${navButtons()}</div>`;

  return `<div class="card">
    <div class="question-meta">${q.prompt}</div>
    <div class="question-text">${q.question}</div>
    <div class="choices">${opts}</div>
    ${fb}
    ${done ? `<div class="btn-row" style="margin-top:16px">${navButtons()}</div>` : `<div class="btn-row" id="btn-row" style="display:none">${navButtons()}</div>`}
  </div>`;
}

function checkMC(chosen) {
  if (results[current] !== null) return;
  const q       = questions[current];
  const correct = chosen === q.answer;
  results[current] = { correct, chosen };
  refreshDots();

  document.querySelectorAll(".choice-btn").forEach(b => {
    b.disabled = true;
    if (b.textContent === q.answer) b.classList.add("correct");
    else if (b.textContent === chosen && !correct) b.classList.add("wrong");
  });

  const fb = document.getElementById("fb");
  fb.className = "feedback " + (correct ? "correct" : "wrong");
  fb.textContent = correct ? "Correcto" : "Incorrecto. La respuesta correcta es: " + q.answer;

  document.getElementById("btn-row").style.display = "flex";
}

// ── DRAG THE WORDS ────────────────────────────────────────────────────────────
function renderDrag(q, done) {
  // init drag state for this question if needed
  if (!dragStates[current]) {
    const bank = [...new Set(q.sentences.map(s => s.blank))].sort(() => Math.random() - 0.5);
    dragStates[current] = { blanks: q.sentences.map(() => null), bank, checked: false };
  }
  const ds = dragStates[current];

  const sentenceHTML = q.sentences.map((s, i) => {
    const val = ds.blanks[i] || "";
    return `<div class="drag-sentence">
      ${s.before} <span class="drag-blank${val ? " filled" : ""}${ds.checked ? " locked" : ""}" id="blank-${i}" onclick="blankClick(${i})">${val || "&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;"}</span> ${s.after}
    </div>`;
  }).join("");

  const chips = ds.bank.map(w => {
    const isUsed = ds.blanks.includes(w) || ds.blanks.map(b => b && b.toLowerCase()).includes(w.toLowerCase());
    return `<span class="word-chip${isUsed ? " used" : ""}" id="chip-${w}" onclick="chipClick('${w}')">${w}</span>`;
  }).join("");

  const fb = ds.checked
    ? `<div class="feedback ${results[current] && results[current].correct ? "correct" : "wrong"}">${results[current] && results[current].correct ? "Correcto" : "Revisa las respuestas correctas arriba."}</div>`
    : `<div class="feedback" id="fb"></div>`;

  const btnRow = ds.checked
    ? `<div class="btn-row" style="margin-top:16px">${navButtons()}</div>`
    : `<div class="btn-row" id="btn-row"><button class="btn btn-primary" onclick="checkDrag()">Verificar</button></div>`;

  return `<div class="card">
    <div class="question-meta">${q.prompt}</div>
    <div class="question-text" style="margin-bottom:12px">${q.title}</div>
    ${sentenceHTML}
    <div class="word-bank" id="word-bank">${chips}</div>
    ${fb}
    ${btnRow}
  </div>`;
}

function restoreDrag(q) {
  const ds = dragStates[current];
  if (!ds || !ds.checked) return;
  q.sentences.forEach((s, i) => {
    const blank = document.getElementById("blank-" + i);
    if (!blank) return;
    const given = ds.blanks[i];
    if (given && given.toLowerCase() === s.blank.toLowerCase()) blank.classList.add("correct-word");
    else blank.classList.add("wrong-word");
  });
}

function chipClick(word) {
  const ds = dragStates[current];
  if (!ds || ds.checked) return;

  // deselect previous
  if (selectedChip) {
    const prev = document.getElementById("chip-" + selectedChip);
    if (prev) prev.style.borderColor = "";
  }

  if (selectedChip === word) { selectedChip = null; return; }

  selectedChip = word;
  const el = document.getElementById("chip-" + word);
  if (el) el.style.borderColor = "#2e7d32";
}

function blankClick(idx) {
  const ds = dragStates[current];
  if (!ds || ds.checked) return;

  if (selectedChip) {
    // place selected chip into this blank
    const old = ds.blanks[idx];
    if (old) {
      // return old word to bank
      const oldChip = document.getElementById("chip-" + old);
      if (oldChip) oldChip.classList.remove("used");
    }
    ds.blanks[idx] = selectedChip;
    document.getElementById("blank-" + idx).textContent = selectedChip;
    document.getElementById("blank-" + idx).classList.add("filled");
    document.getElementById("chip-" + selectedChip).classList.add("used");
    document.getElementById("chip-" + selectedChip).style.borderColor = "";
    selectedChip = null;
  } else {
    // return the word in this blank to the bank
    const word = ds.blanks[idx];
    if (!word) return;
    ds.blanks[idx] = null;
    document.getElementById("blank-" + idx).innerHTML = "&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;";
    document.getElementById("blank-" + idx).classList.remove("filled");
    const chip = document.getElementById("chip-" + word);
    if (chip) chip.classList.remove("used");
  }
}

function checkDrag() {
  const q  = questions[current];
  const ds = dragStates[current];
  if (!ds || ds.checked) return;
  ds.checked = true;

  let allCorrect = true;
  q.sentences.forEach((s, i) => {
    const blank = document.getElementById("blank-" + i);
    const given = ds.blanks[i];
    if (given && given.toLowerCase() === s.blank.toLowerCase()) {
      blank.classList.add("correct-word");
    } else {
      blank.classList.add("wrong-word");
      blank.textContent = s.blank;
      allCorrect = false;
    }
    blank.classList.add("locked");
  });

  results[current] = { correct: allCorrect };
  refreshDots();

  const fb = document.getElementById("fb");
  fb.className = "feedback " + (allCorrect ? "correct" : "wrong");
  fb.textContent = allCorrect ? "Correcto" : "Revisa las respuestas correctas arriba.";

  document.getElementById("btn-row").innerHTML = navButtons();
}

// ── FILL IN THE BLANK ─────────────────────────────────────────────────────────
function renderFill(q, done) {
  let inputHTML;
  if (done) {
    const given   = results[current].given;
    const correct = results[current].correct;
    inputHTML = `<input class="blank-input ${correct ? "correct-input" : "wrong-input"}" value="${given}" disabled>`;
  } else {
    inputHTML = `<input class="blank-input" id="fill-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="...">`;
  }

  const display = q.sentence.replace("___", inputHTML);

  const fb = done
    ? `<div class="feedback ${results[current].correct ? "correct" : "wrong"}">${results[current].correct ? "Correcto" : "La respuesta correcta es: " + q.answer}</div>`
    : `<div class="feedback" id="fb"></div>`;

  const btnRow = done
    ? `<div class="btn-row" style="margin-top:16px">${navButtons()}</div>`
    : `<div class="btn-row" id="btn-row"><button class="btn btn-primary" onclick="checkFill()">Verificar</button></div>`;

  return `<div class="card">
    <div class="question-meta">${q.prompt}</div>
    <div class="question-text" style="margin-bottom:12px">${q.question}</div>
    <div class="blank-sentence">${display}</div>
    ${fb}
    ${btnRow}
  </div>`;
}

function checkFill() {
  if (results[current] !== null) return;
  const q     = questions[current];
  const input = document.getElementById("fill-input");
  const given = input.value.trim();
  const correct = given.toLowerCase() === q.answer.toLowerCase();

  results[current] = { correct, given };
  refreshDots();

  input.classList.add(correct ? "correct-input" : "wrong-input");
  input.disabled = true;

  const fb = document.getElementById("fb");
  fb.className  = "feedback " + (correct ? "correct" : "wrong");
  fb.textContent = correct ? "Correcto" : "La respuesta correcta es: " + q.answer;

  document.getElementById("btn-row").innerHTML = navButtons();
}

// ── SHARED NAV BUTTONS ────────────────────────────────────────────────────────
function navButtons() {
  const isLast = current === questions.length - 1;
  const allDone = results.every(r => r !== null);

  if (isLast && allDone) {
    return `<button class="btn btn-primary" onclick="showResults()">Ver resultado</button>
            <button class="btn btn-secondary" onclick="go(-1)">&#8592; Anterior</button>`;
  }
  if (isLast) {
    return `<button class="btn btn-secondary" onclick="go(-1)">&#8592; Anterior</button>`;
  }
  return `<button class="btn btn-primary" onclick="go(1)">Siguiente &#8594;</button>
          ${current > 0 ? `<button class="btn btn-secondary" onclick="go(-1)">&#8592; Anterior</button>` : ""}`;
}

// ── RESULTS ───────────────────────────────────────────────────────────────────
function showResults() {
  document.getElementById("question-area").style.display      = "none";
  document.getElementById("progress-bar-wrap").style.display  = "none";
  document.getElementById("score-bar").style.display          = "none";
  document.querySelector(".nav-row").style.display            = "none";

  const score = countScore();
  const pct   = score / questions.length;
  let msg = "";
  if (pct === 1)      msg = "Perfecto. Dominaste todos los verbos.";
  else if (pct >= .8) msg = "Muy bien. Casi perfecto.";
  else if (pct >= .6) msg = "Bien. Sigue practicando.";
  else                msg = "Sigue estudiando. Tu puedes.";

  document.getElementById("final-score").textContent = score + " / " + questions.length;
  document.getElementById("result-msg").textContent   = msg;
  document.getElementById("results").style.display    = "block";
}

// ── START ─────────────────────────────────────────────────────────────────────
restart();
</script>
</body>
</html>
