<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spanish with Elisabeth – Ejercicios</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f7f7f5;
      color: #222;
      min-height: 100vh;
      padding: 48px 20px;
    }

    header {
      max-width: 640px;
      margin: 0 auto 40px;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #2e7d32;
      margin-bottom: 4px;
    }

    header p {
      font-size: 0.95rem;
      color: #777;
    }

    h2 {
      max-width: 640px;
      margin: 0 auto 14px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #aaa;
    }

    .exercise-list {
      max-width: 640px;
      margin: 0 auto 48px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .exercise-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border-radius: 12px;
      padding: 16px 20px;
      text-decoration: none;
      color: #222;
      border: 1px solid #e8e8e8;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .exercise-card:hover {
      border-color: #81c784;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .card-left .title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .card-left .meta {
      font-size: 0.82rem;
      color: #999;
    }

    .badge {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: #e8f5e9;
      color: #2e7d32;
      border-radius: 20px;
      padding: 4px 10px;
      white-space: nowrap;
    }

    .arrow {
      color: #ccc;
      font-size: 1.1rem;
      margin-left: 12px;
    }

    footer {
      max-width: 640px;
      margin: 0 auto;
      font-size: 0.82rem;
      color: #bbb;
    }
  </style>
</head>
<body>

<header>
  <h1>Spanish with Elisabeth</h1>
  <p>Ejercicios interactivos de espanol — Latin American Spanish</p>
</header>

<h2>A1 — Principiantes</h2>

<div class="exercise-list">

  <a class="exercise-card" href="animales_ejercicio.html">
    <div class="card-left">
      <div class="title">Los animales</div>
      <div class="meta">Adivinanzas — adivina el animal</div>
    </div>
    <span class="badge">A1</span>
    <span class="arrow">&#8250;</span>
  </a>

  <a class="exercise-card" href="verbos-presente.html">
    <div class="card-left">
      <div class="title">Verbos en presente</div>
      <div class="meta">Seleccion multiple, arrastra las palabras, completa los espacios</div>
    </div>
    <span class="badge">A1</span>
    <span class="arrow">&#8250;</span>
  </a>

  <!-- Add new exercises below this line -->

</div>

<footer>
  Spanish with Elisabeth &mdash; spanishwithelisabeth.com
</footer>

</body>
</html>
